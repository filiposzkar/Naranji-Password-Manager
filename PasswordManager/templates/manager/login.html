{% load static %}
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="{% static 'manager/css/loginStyles.css' %}">  
        <script src="{% static 'manager/js/scriptLogin.js' %}" defer></script>
        <title>Naranji | Log In</title>
    </head>
    <body>
        <div class="sign-up-form">
            <img id="NaranjiLogo" src="{% static 'manager/assets/NaranjiLogo.png' %}">
            <h1 id="Naranji">Naranji</h1>
            <div id="login-step-1">
                <p id="welcome-back">Welcome back!</p>
                <form id="auth-form">
                    {% csrf_token %}
                    <div class="input-group">
                        <label>Username</label>
                        <input type="text" id="given-username" required>
                    </div>
                    <div class="input-group">
                        <label>Password</label>
                        <input type="password" id="given-password" required>
                    </div>
                    <button type="submit" id="login-button">Login</button>
                </form>
            </div>

            <div id="login-step-2" style="display: none;">
                <p id="welcome-back">Enter 6-digit MFA Code</p>
                <div class="input-group">
                    <input type="text" id="mfa-code" placeholder="000000" maxlength="20" style="text-align: center; font-size: 24px;">
                </div>
                <button type="button" id="verify-mfa-button" class="login-button">Verify & Log In</button>

                <div id="recovery-mode" style="display: none; margin-top: 10px;">
                    <input type="text" id="recovery-code-input" maxlength="20" placeholder="XXXX-XXXX-XXXX">
                    <button type="button" id="verify-recovery-button">Verify Code</button>
                </div>
                <a href="/recover-master-key-page/" style="font-size: 16px; color: #e02f18; display: block; margin-left: -45px; margin-top: 20px;">Forgot Master Key? Use Recovery Phrase</a>
            </div>
        </div>
    </body>
