<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="signUpStyles.css">
        <script src="script.js" defer></script>
        <title>Naranji | Sign Up</title>
    </head>
    <body>
        <div class="sign-up-form">
            
            <img id="NaranjiLogo" src="NaranjiLogo.png">
            <h1 id="Naranji">Naranji</h1>
            <p id="create-account">Create your acccount</p>
            
            <div class="sign-up-inputs">
                <div class="input-group">
                    <label>Username</label>
                    <input type="text" id="given-username">
                </div>

                <div class="input-group">
                    <label>Email</label>
                    <input type="text" id="given-email">
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <input type="text" id="given-password">
                </div>
            </div>
            
            <a href="SecretKey.html">
                <button id="sign-up-button">Sign Up</button>
            </a>
            
            <p id="already-have-account">
                Already have an account? <a href="login.html" id="login-link">Log In</a>
            </p>
        </div>
    </body>
